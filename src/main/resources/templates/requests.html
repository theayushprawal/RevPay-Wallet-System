<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('RevPay - Money Requests')}"></head>
<body class="bg-light">
<nav th:replace="~{layout :: navbar}"></nav>

<div class="container mt-5 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-primary">Money Requests</h2>
        <button class="btn btn-primary fw-bold shadow-sm px-4" data-bs-toggle="modal" data-bs-target="#newRequestModal">🤲 Request Money</button>
    </div>

    <ul class="nav nav-pills mb-4 bg-white p-2 rounded-4 shadow-sm" id="requestTabs">
        <li class="nav-item">
            <button class="nav-link active fw-bold px-4" data-bs-toggle="pill" data-bs-target="#incoming">📥 Incoming (To Pay)</button>
        </li>
        <li class="nav-item">
            <button class="nav-link fw-bold px-4" data-bs-toggle="pill" data-bs-target="#outgoing">📤 Outgoing (Pending)</button>
        </li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="incoming">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-light text-muted small text-uppercase">
                            <tr>
                                <th class="ps-4 py-3">From</th>
                                <th>Amount</th>
                                <th>Note</th>
                                <th>Status</th>
                                <th class="text-center pe-4">Action</th>
                            </tr>
                            </thead>
                            <tbody id="incomingBody">
                            <tr><td colspan="5" class="text-center py-5 text-muted"><div class="spinner-border spinner-border-sm text-primary me-2"></div>Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="outgoing">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-light text-muted small text-uppercase">
                            <tr>
                                <th class="ps-4 py-3">Sent To</th>
                                <th>Amount</th>
                                <th>Note</th>
                                <th>Status</th>
                                <th class="text-center pe-4">Action</th>
                            </tr>
                            </thead>
                            <tbody id="outgoingBody">
                            <tr><td colspan="5" class="text-center py-5 text-muted"><div class="spinner-border spinner-border-sm text-primary me-2"></div>Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="newRequestModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-primary text-white border-0">
                <h5 class="modal-title fw-bold">🤲 Request Money</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4 bg-light">
                <div id="requestAlert" class="alert d-none" role="alert"></div>
                <form id="newRequestForm">
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold">Request From</label>
                        <input type="text" id="reqReceiverInput" class="form-control form-control-lg" placeholder="Email, Phone, or Account ID" required>
                        <div class="form-text small">Enter the exact Email, Phone, or RevPay ID.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold">Amount (₹)</label>
                        <input type="number" step="0.01" id="reqAmount" class="form-control form-control-lg" placeholder="0.00" required min="1">
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted fw-bold">What is this for?</label>
                        <input type="text" id="reqNote" class="form-control form-control-lg" placeholder="e.g. Dinner last night, Rent" required>
                    </div>
                    <button type="submit" id="reqSubmitBtn" class="btn btn-primary w-100 fw-bold btn-lg shadow-sm">Send Request</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="acceptModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0 shadow">
            <div class="modal-body p-4 text-center">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="fw-bold text-success mb-0">Accept Request</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <p class="text-muted small mb-4">Enter your 4-digit PIN to authorize this transfer.</p>
                <div id="acceptAlert" class="alert d-none small" role="alert"></div>
                <form id="acceptForm">
                    <input type="hidden" id="acceptReqId">
                    <div class="mb-4">
                        <input type="password" id="acceptPin" class="form-control form-control-lg text-center tracking-widest bg-light border-success" pattern="\d{4}" maxlength="4" placeholder="****" required>
                    </div>
                    <button type="submit" id="acceptBtn" class="btn btn-success w-100 fw-bold btn-lg shadow-sm">Confirm & Pay</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{layout :: scripts}"></div>
<script>
    const userId = localStorage.getItem('userId');

    document.addEventListener("DOMContentLoaded", function() {
        if (!userId) { window.location.href = '/login'; return; }
        loadRequests();
    });

    function loadRequests() {
        // Load Incoming
        fetch(`/money-requests/incoming/${userId}`).then(res => res.json()).then(data => {
            const tbody = document.getElementById('incomingBody');
            tbody.innerHTML = '';
            const reqs = data.data || [];

            // FIXED: Changed requestDate to createdAt so the sorting actually works
            reqs.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

            if(reqs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-5 text-muted">No incoming requests.</td></tr>';
                return;
            }

            reqs.forEach(req => {
                const badge = getStatusBadge(req.status);
                let actions = '';
                // Actions only show if the status is strictly PENDING
                if(req.status === 'PENDING') {
                    actions = `
                        <button class="btn btn-sm btn-success fw-bold me-1 shadow-sm" onclick="openAcceptModal(${req.requestId})">Accept</button>
                        <button class="btn btn-sm btn-outline-danger fw-bold shadow-sm" onclick="declineReq(${req.requestId})">Decline</button>
                    `;
                } else {
                    actions = `<span class="text-muted small">No actions</span>`;
                }

                tbody.innerHTML += `
                    <tr>
                        <td class="ps-4 fw-bold text-dark">${req.sender.fullName} <br><small class="text-muted fw-normal">ID: ${req.sender.userId}</small></td>
                        <td class="fw-bold text-danger fs-5">₹${parseFloat(req.amount).toLocaleString('en-IN', {minimumFractionDigits: 2})}</td>
                        <td><span class="small fw-semibold text-secondary">${req.remarks || '---'}</span></td>
                        <td>${badge}</td>
                        <td class="text-center pe-4">${actions}</td>
                    </tr>
                `;
            });
        });

        // Load Outgoing
        fetch(`/money-requests/outgoing/${userId}`).then(res => res.json()).then(data => {
            const tbody = document.getElementById('outgoingBody');
            tbody.innerHTML = '';
            const reqs = data.data || [];

            // FIXED: Changed requestDate to createdAt so the sorting actually works
            reqs.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

            if(reqs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-5 text-muted">No outgoing requests.</td></tr>';
                return;
            }

            reqs.forEach(req => {
                const badge = getStatusBadge(req.status);
                let actions = '';
                // Actions only show if the status is strictly PENDING
                if(req.status === 'PENDING') {
                    actions = `<button class="btn btn-sm btn-outline-warning text-dark fw-bold shadow-sm" onclick="cancelReq(${req.requestId})">Cancel Request</button>`;
                } else {
                    actions = `<span class="text-muted small">No actions</span>`;
                }

                tbody.innerHTML += `
                    <tr>
                        <td class="ps-4 fw-bold text-dark">${req.receiver.fullName} <br><small class="text-muted fw-normal">ID: ${req.receiver.userId}</small></td>
                        <td class="fw-bold text-success fs-5">₹${parseFloat(req.amount).toLocaleString('en-IN', {minimumFractionDigits: 2})}</td>
                        <td><span class="small fw-semibold text-secondary">${req.remarks || '---'}</span></td>
                        <td>${badge}</td>
                        <td class="text-center pe-4">${actions}</td>
                    </tr>
                `;
            });
        });
    }

    // UPDATED: Added EXPIRED badge mapping and changed PENDING color
    function getStatusBadge(status) {
        if(status === 'PENDING') return '<span class="badge bg-primary px-2 py-1 shadow-sm">PENDING</span>'; // Blue for pending
        if(status === 'ACCEPTED') return '<span class="badge bg-success px-2 py-1 shadow-sm">ACCEPTED</span>';
        if(status === 'DECLINED') return '<span class="badge bg-danger px-2 py-1 shadow-sm">DECLINED</span>';
        if(status === 'CANCELLED') return '<span class="badge bg-secondary px-2 py-1 shadow-sm">CANCELLED</span>';
        if(status === 'EXPIRED') return '<span class="badge bg-warning text-dark px-2 py-1 shadow-sm">EXPIRED</span>'; // Orange for expired
        return `<span class="badge bg-dark">${status}</span>`;
    }

    // --- USING THE GLOBAL revPayConfirm ---
    function declineReq(id) {
        revPayConfirm("Are you sure you want to decline this money request? This action cannot be undone.")
        .then((confirmed) => {
            if(confirmed) {
                fetch(`/money-requests/decline?requestId=${id}`, { method: 'POST' }).then(() => {
                    alert("Request declined.");
                    loadRequests();
                });
            }
        });
    }

    function cancelReq(id) {
        revPayConfirm("Cancel this pending money request?")
        .then((confirmed) => {
            if(confirmed) {
                fetch(`/money-requests/cancel?requestId=${id}`, { method: 'POST' }).then(() => {
                    alert("Request cancelled.");
                    loadRequests();
                });
            }
        });
    }

    // --- 2-STEP REQUEST MONEY API LOGIC ---
    document.getElementById('newRequestForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const receiverInput = document.getElementById('reqReceiverInput').value.trim();
        const amt = document.getElementById('reqAmount').value;
        const note = document.getElementById('reqNote').value;
        const alertBox = document.getElementById('requestAlert');
        const btn = document.getElementById('reqSubmitBtn');

        btn.disabled = true;
        btn.textContent = "Looking up user...";
        alertBox.classList.add('d-none');

        try {
            const lookupRes = await fetch(`/users/lookup?identifier=${encodeURIComponent(receiverInput)}`);
            const lookupData = await lookupRes.json();

            if (!lookupData.success) {
                btn.disabled = false; btn.textContent = "Send Request";
                alertBox.className = 'alert alert-warning mb-3';
                alertBox.textContent = "Could not find a user with that Email, Phone, or ID.";
                alertBox.classList.remove('d-none');
                return;
            }

            const resolvedReceiverId = lookupData.data;
            if(resolvedReceiverId == userId) {
                 btn.disabled = false; btn.textContent = "Send Request";
                 alertBox.className = 'alert alert-warning mb-3';
                 alertBox.textContent = "You cannot request money from yourself.";
                 alertBox.classList.remove('d-none');
                 return;
            }

            btn.textContent = "Sending Request...";
            const createRes = await fetch(`/money-requests/create?senderId=${userId}&receiverId=${resolvedReceiverId}&amount=${amt}&note=${encodeURIComponent(note)}`, { method: 'POST' });
            const createData = await createRes.json();

            btn.disabled = false; btn.textContent = "Send Request";

            if(createData.success) {
                bootstrap.Modal.getInstance(document.getElementById('newRequestModal')).hide();
                document.getElementById('newRequestForm').reset();
                alert("Money request sent successfully!");
                loadRequests();
            } else {
                alertBox.className = 'alert alert-danger mb-3';
                alertBox.textContent = createData.message || "Failed to send request.";
                alertBox.classList.remove('d-none');
            }
        } catch (error) {
            btn.disabled = false; btn.textContent = "Send Request";
            alertBox.className = 'alert alert-danger mb-3';
            alertBox.textContent = "Server connection error.";
            alertBox.classList.remove('d-none');
        }
    });

    // --- ACCEPT REQUEST LOGIC ---
    function openAcceptModal(id) {
        document.getElementById('acceptReqId').value = id;
        document.getElementById('acceptAlert').classList.add('d-none');
        document.getElementById('acceptPin').value = '';
        new bootstrap.Modal(document.getElementById('acceptModal')).show();
    }

    document.getElementById('acceptForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const id = document.getElementById('acceptReqId').value;
        const pin = document.getElementById('acceptPin').value;
        const btn = document.getElementById('acceptBtn');
        const alertBox = document.getElementById('acceptAlert');

        btn.disabled = true; btn.textContent = "Processing...";
        alertBox.classList.add('d-none');

        fetch(`/money-requests/accept?requestId=${id}&transactionPin=${encodeURIComponent(pin)}`, { method: 'POST' })
        .then(res => res.json()).then(data => {
            btn.disabled = false; btn.textContent = "Confirm & Pay";
            if(data.success) {
                bootstrap.Modal.getInstance(document.getElementById('acceptModal')).hide();
                document.getElementById('acceptForm').reset();
                alert("Payment authorized successfully!");
                loadRequests();
            } else {
                alertBox.className = 'alert alert-danger mb-3';
                alertBox.textContent = data.message || "Failed to process payment.";
                alertBox.classList.remove('d-none');
            }
        }).catch(() => {
            btn.disabled = false; btn.textContent = "Confirm & Pay";
            alertBox.className = 'alert alert-danger mb-3';
            alertBox.textContent = "Server error.";
            alertBox.classList.remove('d-none');
        });
    });
</script>
</body>
</html>
