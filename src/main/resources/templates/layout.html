<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">RevPay</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm sticky-top py-2">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary fs-4 tracking-tight" href="/dashboard">💳 RevPay</a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto fw-semibold">
                <li class="nav-item mx-1"><a class="nav-link text-dark" href="/dashboard">Dashboard</a></li>
                <li class="nav-item mx-1"><a class="nav-link text-dark" href="/transactions">Transactions</a></li>
                <li class="nav-item mx-1"><a class="nav-link text-dark" href="/requests">Requests</a></li>
                <li class="nav-item mx-1"><a class="nav-link text-dark" href="/invoices">Invoices</a></li>
                <li class="nav-item mx-1"><a class="nav-link text-dark" href="/loans">Loans</a></li>
                <li class="nav-item mx-1"><a class="nav-link text-info" href="/analytics">📊 Analytics</a></li>
            </ul>

            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item me-3">
                    <a class="nav-link position-relative" href="/notifications" title="Notifications">
                        <span class="fs-5">🔔</span>
                        <span id="notifCount" class="position-absolute top-25 start-75 translate-middle badge rounded-pill bg-danger d-none" style="font-size: 0.65em;">0</span>
                    </a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle fw-bold text-dark d-flex align-items-center gap-2" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                        <div class="bg-primary text-white rounded-circle text-center" style="width: 32px; height: 32px; line-height: 32px;">👤</div>
                        My Account
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end border-0 shadow rounded-4 mt-2">
                        <li><a class="dropdown-item py-2 fw-semibold" href="/profile">⚙️ Profile Settings</a></li>
                        <li><a class="dropdown-item py-2 fw-semibold" href="/payment-methods">🏦 Cards & Banks</a></li>
                        <li><hr class="dropdown-divider opacity-25"></li>
                        <li><a class="dropdown-item py-2 fw-bold text-danger" href="#" onclick="logout()">🚪 Logout</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
    <script th:fragment="logoutScript">
        function logout() { localStorage.removeItem('userId'); window.location.href = '/login'; }
    </script>
</nav>

<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <div class="modal fade" id="globalAlertModal" tabindex="-1" style="z-index: 1056;">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white border-0 py-2">
                    <h6 class="modal-title fw-bold mb-0">💳 RevPay Says</h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" style="font-size: 0.7rem;"></button>
                </div>
                <div class="modal-body p-4 text-center">
                    <p id="globalAlertMessage" class="mb-0 fw-semibold text-dark"></p>
                </div>
                <div class="modal-footer border-0 justify-content-center pt-0 pb-3">
                    <button type="button" class="btn btn-primary fw-bold w-100" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="globalConfirmModal" tabindex="-1" style="z-index: 1056;">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 shadow">
                <div class="modal-body p-4 text-center">
                    <div class="mb-3">
                        <span class="display-4 text-warning">⚠️</span>
                    </div>
                    <h5 class="fw-bold mb-3 text-dark">Are you sure?</h5>
                    <p id="globalConfirmMessage" class="text-muted small mb-4"></p>
                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-light fw-bold w-100" id="globalConfirmNo">No</button>
                        <button type="button" class="btn btn-danger fw-bold w-100" id="globalConfirmYes">Yes</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // GLOBAL ALERT OVERRIDE
        window.alert = function(message) {
            document.getElementById('globalAlertMessage').textContent = message;
            new bootstrap.Modal(document.getElementById('globalAlertModal')).show();
        };

        // GLOBAL ASYNC CONFIRM FUNCTION
        window.revPayConfirm = function(message) {
            return new Promise((resolve) => {
                document.getElementById('globalConfirmMessage').textContent = message;
                const modalEl = document.getElementById('globalConfirmModal');
                const confirmModal = new bootstrap.Modal(modalEl);

                const yesBtn = document.getElementById('globalConfirmYes');
                const noBtn = document.getElementById('globalConfirmNo');

                // Cleanup to prevent multiple click events stacking up
                const cleanup = () => {
                    yesBtn.onclick = null;
                    noBtn.onclick = null;
                    confirmModal.hide();
                };

                yesBtn.onclick = () => { cleanup(); resolve(true); };
                noBtn.onclick = () => { cleanup(); resolve(false); };

                // If they click outside the modal to close it, treat as 'No'
                modalEl.addEventListener('hidden.bs.modal', function onHide() {
                    cleanup();
                    resolve(false);
                    modalEl.removeEventListener('hidden.bs.modal', onHide);
                });

                confirmModal.show();
            });
        };
    </script>
</div>

</body>
</html>
