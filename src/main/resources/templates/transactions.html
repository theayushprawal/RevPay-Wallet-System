<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('RevPay - Transactions')}"></head>

<body class="bg-light">

<nav th:replace="~{layout :: navbar}"></nav>

<div class="container mt-5 mb-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-primary">Transaction Ledger</h2>
        <div>
            <button class="btn btn-outline-primary fw-bold bg-white me-2" onclick="loadFilteredHistory(0)">🔄 Refresh</button>
            <a id="exportCsvBtn" class="btn btn-success fw-bold shadow-sm" href="#" target="_blank">📥 Download CSV</a>
        </div>
    </div>

    <div class="row">
        <div class="col-12">

            <div class="accordion shadow-sm border-0 rounded-4 mb-4" id="filterAccordion">
                <div class="accordion-item border-0 rounded-4">
                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed fw-bold text-secondary bg-white rounded-4" type="button" data-bs-toggle="collapse" data-bs-target="#collapseFilters">
                            🔍 Advanced Search & Filters
                        </button>
                    </h2>
                    <div id="collapseFilters" class="accordion-collapse collapse" data-bs-parent="#filterAccordion">
                        <div class="accordion-body bg-light border-top">
                            <form id="filterForm">
                                <div class="row g-3">
                                    <div class="col-md-12">
                                        <label class="small fw-bold text-muted">Search Name or ID</label>
                                        <input type="text" id="fSearch" class="form-control" placeholder="e.g. John Doe, 104">
                                    </div>
                                    <div class="col-md-4">
                                        <label class="small fw-bold text-muted">Transaction Type</label>
                                        <select id="fType" class="form-select">
                                            <option value="">All Types</option>
                                            <option value="SEND">Sent Money</option>
                                            <option value="RECEIVE">Received Money</option>
                                            <option value="DEPOSIT">Deposits</option>
                                            <option value="WITHDRAW">Withdrawals</option>
                                            <option value="LOAN_CREDIT">Loan Disbursement</option>
                                            <option value="LOAN_REPAYMENT">Loan EMI</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="small fw-bold text-muted">Status</label>
                                        <select id="fStatus" class="form-select">
                                            <option value="">All Statuses</option>
                                            <option value="SUCCESS">Success</option>
                                            <option value="FAILED">Failed</option>
                                            <option value="PENDING">Pending</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="small fw-bold text-muted">Date Range</label>
                                        <div class="d-flex align-items-center gap-2">
                                            <input type="date" id="fStartDate" class="form-control" title="Start Date">
                                            <span class="text-muted small fw-bold">to</span>
                                            <input type="date" id="fEndDate" class="form-control" title="End Date">
                                        </div>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="small fw-bold text-muted">Min Amount (₹)</label>
                                        <input type="number" id="fMin" class="form-control" placeholder="0">
                                    </div>
                                    <div class="col-md-4">
                                        <label class="small fw-bold text-muted">Max Amount (₹)</label>
                                        <input type="number" id="fMax" class="form-control" placeholder="999999">
                                    </div>
                                    <div class="col-12 text-end mt-4">
                                        <button type="button" class="btn btn-light fw-bold me-2" onclick="clearFilters()">Clear</button>
                                        <button type="button" class="btn btn-dark fw-bold px-4" onclick="loadFilteredHistory(0)">Apply Filters</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-header bg-white border-0 pt-4 pb-0">
                    <h5 class="fw-bold text-secondary mb-0">Ledger</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0 mt-3">
                            <thead class="bg-light">
                            <tr class="text-muted small text-uppercase border-bottom">
                                <th class="ps-4">Date & Time</th>
                                <th>Type</th>
                                <th>Details</th>
                                <th>Status</th>
                                <th class="text-end pe-4">Amount</th>
                            </tr>
                            </thead>
                            <tbody id="historyTableBody">
                            <tr>
                                <td colspan="5" class="text-center text-muted py-5">
                                    <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div>
                                    Loading ledger...
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="card-footer bg-white border-0 py-3 d-flex justify-content-between align-items-center" id="paginationControls">
                    <button class="btn btn-sm btn-outline-secondary fw-bold" id="prevBtn" onclick="changePage(-1)" disabled>← Previous</button>
                    <span class="small fw-bold text-muted" id="pageInfo">Page 1 of 1</span>
                    <button class="btn btn-sm btn-outline-secondary fw-bold" id="nextBtn" onclick="changePage(1)" disabled>Next →</button>
                </div>
            </div>

        </div>
    </div>
</div>

<div th:replace="~{layout :: scripts}"></div>

<script>
    const userId = localStorage.getItem('userId');
    let currentPage = 0;
    let totalPages = 1;

    document.addEventListener("DOMContentLoaded", function() {
        if (!userId) { window.location.href = '/login'; return; }

        document.getElementById('exportCsvBtn').href = `/transactions/export/csv?userId=${userId}`;
        loadFilteredHistory(0);
    });

    // --- 1. FILTER & PAGINATION LOGIC ---
    function clearFilters() {
        document.getElementById('filterForm').reset();
        loadFilteredHistory(0);
    }

    function changePage(direction) {
        let newPage = currentPage + direction;
        if (newPage >= 0 && newPage < totalPages) {
            loadFilteredHistory(newPage);
        }
    }

    function loadFilteredHistory(pageIndex) {
        currentPage = pageIndex;
        const tbody = document.getElementById('historyTableBody');
        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-5"><div class="spinner-border spinner-border-sm text-primary me-2"></div>Fetching data...</td></tr>';

        // Build Payload from form
        const payload = { userId: parseInt(userId) };

        const search = document.getElementById('fSearch').value;
        if(search) payload.searchTerm = search;

        const type = document.getElementById('fType').value;
        if(type) payload.txnType = type;

        const status = document.getElementById('fStatus').value;
        if(status) payload.status = status;

        const sDate = document.getElementById('fStartDate').value;
        if(sDate) payload.startDate = sDate + "T00:00:00";

        const eDate = document.getElementById('fEndDate').value;
        if(eDate) payload.endDate = eDate + "T23:59:59";

        const min = document.getElementById('fMin').value;
        if(min) payload.minAmount = parseFloat(min);

        const max = document.getElementById('fMax').value;
        if(max) payload.maxAmount = parseFloat(max);

        // Call the POST filter/paged endpoint
        fetch(`/transactions/filter/paged?page=${currentPage}&size=10`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            if (data.success && data.data) {
                tbody.innerHTML = '';

                const pageObj = data.data;
                totalPages = pageObj.totalPages || 1;

                document.getElementById('pageInfo').textContent = `Page ${currentPage + 1} of ${totalPages}`;
                document.getElementById('prevBtn').disabled = (currentPage === 0);
                document.getElementById('nextBtn').disabled = (currentPage >= totalPages - 1);

                const myTransactions = (pageObj.content || []).filter(txn => {
                    const myId = String(userId);
                    const sId = txn.sender ? String(txn.sender.userId) : null;
                    const rId = txn.receiver ? String(txn.receiver.userId) : null;
                    if (txn.txnType === 'SEND') return myId === sId;
                    if (txn.txnType === 'RECEIVE') return myId === rId;
                    return true;
                });

                if (myTransactions.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-5">No transactions found matching criteria.</td></tr>';
                    return;
                }

                myTransactions.forEach(txn => {
                    let statusBadge = txn.status === 'SUCCESS' ? 'bg-success' : (txn.status === 'FAILED' ? 'bg-danger' : 'bg-warning text-dark');

                    let amtColor = 'text-dark';
                    let sign = '';
                    if (['SEND', 'WITHDRAW', 'LOAN_REPAYMENT'].includes(txn.txnType)) {
                        amtColor = 'text-danger'; sign = '-';
                    } else if (['RECEIVE', 'DEPOSIT', 'LOAN_CREDIT'].includes(txn.txnType)) {
                        amtColor = 'text-success'; sign = '+';
                    }

                    const amt = parseFloat(txn.amount).toLocaleString('en-IN', {minimumFractionDigits: 2});
                    const dateStr = new Date(txn.txnDate).toLocaleString([], {year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit'});

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="ps-4"><span class="text-muted small fw-bold">${dateStr}</span></td>
                        <td><span class="badge bg-light text-dark border">${txn.txnType.replace('_', ' ')}</span></td>
                        <td><span class="small fw-semibold text-secondary">${txn.remarks || '---'}</span></td>
                        <td><span class="badge ${statusBadge} shadow-sm">${txn.status}</span></td>
                        <td class="text-end pe-4 fw-bold ${amtColor}">${sign}₹${amt}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } else {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger py-4">${data.message}</td></tr>`;
            }
        })
        .catch(error => {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger py-4">Server error while loading history.</td></tr>';
        });
    }
</script>
</body>
</html>
